openapi: "3.1.0"
info:
  title: "shapez2-generator API"
  description: "shapez2-generator API"
  version: "1.0.0"
servers:
  - url: "https://shapez2api.raphdf201.net"
paths:
  /v1/item/{id}:
    get:
      description: "Gets info about a specific workshop item"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "integer"
            format: "int64"
      responses:
        "400":
          description: "Bad Request"
          content:
            '*/*':
              schema:
                type: "string"
              examples:
                Example#1:
                  value: "Missing title"
                Example#2:
                  value: "Invalid ID"
        "200":
          description: "OK"
          content:
            'application/json':
              schema:
                $ref: "#/components/schemas/DbWorkshopItem"
        "404":
          description: "Not Found"
          content:
            '*/*':
              schema:
                type: "string"
        "500":
          description: "Internal Server Error"
          content:
            '*/*':
              schema:
                type: "string"
              examples:
                Example#1:
                  value: ""
  /v1/item/list:
    get:
      description: "Get a simplified list of workshop items"
      responses:
        "200":
          description: "OK"
          content:
            'application/json':
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/SimpleWorkshopItem"
components:
  schemas:
    DbWorkshopItem:
      type: "object"
      properties:
        id:
          type: "integer"
          format: "int64"
        lastSteamUpdate:
          type: "integer"
          format: "int64"
        lastLocalUpdate:
          type: "integer"
          format: "int64"
        steamName:
          type: "string"
        latestVersion:
          type: "string"
        tags:
          type: "array"
          items:
            type: "object"
            properties:
              tag:
                type: "string"
              display_name:
                type: "string"
            required:
              - "tag"
              - "display_name"
      required:
        - "id"
        - "lastSteamUpdate"
        - "lastLocalUpdate"
        - "steamName"
        - "latestVersion"
        - "tags"
    SimpleWorkshopItem:
      type: "object"
      properties:
        id:
          type: "integer"
          format: "int64"
        steamName:
          type: "string"
        tags:
          type: "array"
          items:
            type: "object"
            properties:
              tag:
                type: "string"
              display_name:
                type: "string"
            required:
              - "tag"
              - "display_name"
      required:
        - "id"
        - "steamName"
        - "tags"
